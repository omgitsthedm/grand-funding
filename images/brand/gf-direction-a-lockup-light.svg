  <text x="230" y="166" fill="#F8F8F5" font-family="'Plus Jakarta Sans','Avenir Next','Segoe UI',sans-serif" font-size="76" font-weight="800" letter-spacing="6">FUNDING</text>
  <text x="235" y="208" fill="#F1E8D4" font-family="'Plus Jakarta Sans','Avenir Next','Segoe UI',sans-serif" font-size="24" font-weight="700" letter-spacing="8">PRIVATE</text>
  <text x="235" y="236" fill="#F1E8D4" font-family="'Plus Jakarta Sans','Avenir Next','Segoe UI',sans-serif" font-size="24" font-weight="700" letter-spacing="8">LENDING</text>
