<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" role="img" aria-labelledby="title desc">
  <title id="title">Grand Funding seal stamp</title>
  <desc id="desc">A filled art deco GF stamp for premium collateral.</desc>
  <defs>
