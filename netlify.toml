[build]
  publish = "."
  command = "echo 'No build command needed - static site'"

# Canonical host: force www
[[redirects]]
  from = "https://grandfundingllc.com/*"
  to = "https://www.grandfundingllc.com/:splat"
  status = 301
  force = true

# Pretty URLs
[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 301

[[redirects]]
  from = "/products"
  to = "/products.html"
  status = 301

[[redirects]]
  from = "/blog"
  to = "/blog.html"
  status = 301

[[redirects]]
  from = "/resources"
  to = "/blog.html"
  status = 301

[[redirects]]
  from = "/faq"
  to = "/faq.html"
  status = 301

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

# Legacy patterns (Wix/blog)
[[redirects]]
  from = "/post/*"
  to = "/blog.html"
  status = 301

# Netlify rewrites for clean URLs (no extra redirect hop)
[[redirects]]
  from = "/apply"
  to = "/apply.html"
  status = 200

[[redirects]]
  from = "/thanks"
  to = "/thanks.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Reasonable caching without file-hash versioning
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"