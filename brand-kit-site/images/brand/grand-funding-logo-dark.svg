<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 320" role="img" aria-labelledby="title desc">
  <title id="title">Grand Funding primary logo</title>
  <desc id="desc">Primary Grand Funding lockup with angled GF stamp and wordmark.</desc>
  <defs>
    <linearGradient id="accent" x1="42" y1="42" x2="280" y2="262" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#71E9DD"/>
      <stop offset="0.5" stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#D4A853"/>
    </linearGradient>
    <linearGradient id="typeAccent" x1="360" y1="220" x2="875" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8F8F5"/>
      <stop offset="1" stop-color="#E6D8BF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="10" dy="12" stdDeviation="10" flood-color="#020304" flood-opacity="0.26"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <g transform="rotate(-7 160 160)">
      <rect x="58" y="58" width="204" height="204" rx="36" fill="none" stroke="#0B1418" stroke-opacity="0.4" stroke-width="16" transform="translate(8 10)"/>
      <rect x="58" y="58" width="204" height="204" rx="36" fill="none" stroke="url(#accent)" stroke-width="12"/>
      <rect x="76" y="76" width="168" height="168" rx="28" fill="none" stroke="#F8F8F5" stroke-opacity="0.28" stroke-width="3"/>
      <path d="M208 104H126c-29 0-52 23-52 52v14c0 29 23 52 52 52h54c25 0 46-21 46-46v-6h-40" fill="none" stroke="#F8F8F5" stroke-linecap="square" stroke-linejoin="miter" stroke-width="20"/>
      <path d="M132 98v126M132 98h76M132 152h56" fill="none" stroke="url(#accent)" stroke-linecap="square" stroke-linejoin="miter" stroke-width="18"/>
      <path d="M100 72h26M72 100v26M220 248h26M248 220v26" fill="none" stroke="url(#accent)" stroke-linecap="square" stroke-width="4" opacity="0.55"/>
    </g>
  </g>
  <g>
    <text x="360" y="136" fill="url(#typeAccent)" font-family="'Plus Jakarta Sans','Avenir Next','Segoe UI',sans-serif" font-size="76" font-weight="800" letter-spacing="2">GRAND</text>
    <text x="360" y="212" fill="url(#typeAccent)" font-family="'Plus Jakarta Sans','Avenir Next','Segoe UI',sans-serif" font-size="76" font-weight="800" letter-spacing="2">FUNDING</text>
    <line x1="362" y1="248" x2="496" y2="248" stroke="url(#accent)" stroke-width="3"/>
    <line x1="736" y1="248" x2="870" y2="248" stroke="url(#accent)" stroke-width="3"/>
    <text x="520" y="257" fill="url(#accent)" font-family="'Plus Jakarta Sans','Avenir Next','Segoe UI',sans-serif" font-size="24" font-weight="700" letter-spacing="10" text-anchor="middle">PRIVATE LENDING</text>
  </g>
